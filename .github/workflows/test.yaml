name: Test Nix Package Persistence

on:
  workflow_dispatch:
  push:
    branches: ["test-nix-persistence"]


jobs:
  install-packages:
    name: "Install Nix Packages (Write to Store)"
    runs-on: arc-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup dependencies
        run: |
          echo "=== Setting up dependencies ==="
          # Install required dependencies first
          sudo apt-get update -q
          sudo apt-get install -y xz-utils curl util-linux
          
          # Verify dependencies
          which xz && xz --version || echo "xz not found"
          echo "=== Dependencies installed ==="
      
      - name: Install Nix manually
        run: |
          echo "=== Installing Nix manually ==="
          
          # Debug: Check current state of /nix
          echo "=== Current /nix state ==="
          ls -la / | grep nix || echo "No /nix directory found"
          ls -la /nix || echo "/nix directory not accessible"
          whoami
          id
          
          # Fix permissions on /nix directory as suggested by the installer
          echo "=== Fixing /nix permissions ==="
          sudo chown -R runner:runner /nix
          sudo chmod -R 755 /nix
          
          echo "=== After permission fix ==="
          ls -la /nix
          
          # Temporarily move existing store content to avoid path conflicts
          echo "=== Temporarily moving existing store content ==="
          if [ -d "/nix/lower-store/store" ]; then
            sudo mv /nix/lower-store /nix/lower-store-backup
            sudo mkdir -p /nix/lower-store
            echo "Moved existing store content to backup"
          fi
          
          if [ -d "/nix/upper-store" ]; then
            sudo mv /nix/upper-store /nix/upper-store-backup  
            sudo mkdir -p /nix/upper-store
            echo "Moved existing upper store to backup"
          fi
          
          # Clean up any existing /nix/store that might conflict
          if [ -d "/nix/store" ]; then
            sudo mv /nix/store /nix/store-backup
            echo "Moved existing /nix/store to backup"
          fi
          
          ls -la /nix/
          
          # Use the standard Nix installer but configure it for single-user mode
          curl -L https://nixos.org/nix/install | sh -s -- --no-daemon
          
          # Source the Nix profile
          . ~/.nix-profile/etc/profile.d/nix.sh
          
          # Add to environment for subsequent steps
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "NIX_PATH=$NIX_PATH" >> $GITHUB_ENV
          
          # Verify installation
          nix --version
          which nix
          echo "=== Nix installed successfully ==="
          
          # Restore backed-up store content for overlay filesystem use
          echo "=== Restoring backed-up store content ==="
          if [ -d "/nix/lower-store-backup" ]; then
            sudo rm -rf /nix/lower-store
            sudo mv /nix/lower-store-backup /nix/lower-store
            echo "Restored lower store backup"
          fi
          
          if [ -d "/nix/upper-store-backup" ]; then
            sudo rm -rf /nix/upper-store  
            sudo mv /nix/upper-store-backup /nix/upper-store
            echo "Restored upper store backup"
          fi
          
          echo "=== Store content restored ==="
          ls -la /nix/lower-store | head -5 || echo "Lower store empty"
          ls -la /nix/upper-store | head -5 || echo "Upper store empty"
      
      - name: Test basic Nix functionality
        run: |
          echo "=== Testing Basic Nix Functionality ==="
          # Source Nix environment
          . ~/.nix-profile/etc/profile.d/nix.sh
          
          # Verify Nix installation
          nix --version
          echo "=== Nix installed successfully ==="
          
          # Test installing a basic package
          echo "=== Installing test package ==="
          nix-env -iA nixpkgs.hello
          
          # Test that the package works
          echo "=== Testing installed package ==="
          hello
          
          echo "=== Basic Nix test completed ==="
          
      - name: Migrate to overlay filesystem
        run: |
          echo "=== Migrating to Overlay Filesystem ==="
          
          # Source Nix environment
          . ~/.nix-profile/etc/profile.d/nix.sh
          
          # Verify our mounted storage is available
          echo "=== Storage verification ==="
          df -h | grep "/nix"
          ls -la /nix/lower-store || echo "Lower store not mounted"
          ls -la /nix/upper-store || echo "Upper store not mounted"  
          ls -la /nix/workdir || echo "Workdir not mounted"
          
          # Copy current Nix store to the lower layer (read-only base)
          echo "=== Copying current store to lower layer ==="
          sudo cp -r /nix/store/* /nix/lower-store/ 2>/dev/null || echo "Store copy completed"
          sudo cp -r /nix/var /nix/lower-store/ 2>/dev/null || echo "Var copy completed"
          
          # Set up overlay filesystem
          echo "=== Setting up overlay filesystem ==="
          sudo mkdir -p /nix/merged-store
          
          # Clear workdir (must be empty for overlay)
          sudo rm -rf /nix/workdir/*
          sudo mkdir -p /nix/workdir/work
          
          # Mount overlay filesystem
          sudo mount -t overlay overlay \
            -o lowerdir=/nix/lower-store,upperdir=/nix/upper-store,workdir=/nix/workdir \
            /nix/merged-store || {
            echo "Overlay mount failed, checking requirements..."
            lsmod | grep overlay || echo "Overlay module not loaded"
            echo "Falling back to bind mount"
            sudo mount --bind /nix/upper-store /nix/merged-store
          }
          
          # Configure Nix to use overlay store
          echo "=== Configuring Nix overlay store ==="
          mkdir -p ~/.config/nix
          cat << 'EOF' > ~/.config/nix/nix.conf
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
          experimental-features = nix-command flakes local-overlay-store read-only-local-store
          store = local-overlay://?root=/nix/merged-store&lower-store=/nix/lower-store&upper-layer=/nix/upper-store&check-mount=false
          EOF
          
          echo "=== Nix overlay configuration created ==="
          cat ~/.config/nix/nix.conf
          
          # Test installing a package to the overlay store
          echo "=== Testing overlay store ==="
          nix-env -iA nixpkgs.cowsay
          
          # Verify it went to the upper layer
          echo "=== Verifying overlay store installation ==="
          ls -la /nix/upper-store | head -10 || echo "Upper store check"
          ls -la /nix/merged-store | head -10 || echo "Merged store check"
          
          # Test the newly installed package
          cowsay "Overlay filesystem working!" || echo "Cowsay not found"
          
          echo "=== Overlay filesystem migration completed ==="
      
      - name: Show initial Nix store status
        run: |
          echo "=== Initial Nix Store Status ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          ls -la /nix/store | head -20
          echo "Total packages in store: $(ls /nix/store | wc -l)"
          
      - name: Show build cache status
        run: |
          echo "=== Build Cache Status ==="
          ls -la /build-cache
          du -sh /build-cache
          
      - name: Check Nix configuration
        run: |
          echo "=== Nix Configuration ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          cat /home/runner/.config/nix/nix.conf || echo "No nix.conf found"
          
      - name: Install test packages
        run: |
          echo "=== Installing test packages ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          
          # Install cowsay (fun package for testing)
          echo "Installing cowsay..."
          nix-env -iA nixpkgs.cowsay
          
          # Install hello (classic test package)
          echo "Installing hello..."
          nix-env -iA nixpkgs.hello
          
          # Install jq (useful utility)
          echo "Installing jq..."
          nix-env -iA nixpkgs.jq
          
          # Install tree (directory visualization)
          echo "Installing tree..."
          nix-env -iA nixpkgs.tree
          
      - name: Test installed packages
        run: |
          echo "=== Testing installed packages ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          
          # Test cowsay
          cowsay "Nix packages installed successfully!"
          
          # Test hello
          hello
          
          # Test jq
          echo '{"message": "Nix persistence test", "status": "success"}' | jq .
          
          # Test tree
          tree -L 2 /nix/store | head -20
          
      - name: Show final Nix store status
        run: |
          echo "=== Final Nix Store Status ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          echo "Total packages in store: $(ls /nix/store | wc -l)"
          echo "Store size: $(du -sh /nix/store)"
          
          # List recently added packages
          echo "=== Recently added packages ==="
          find /nix/store -name "*cowsay*" -o -name "*hello*" -o -name "*jq*" -o -name "*tree*" | head -10
          
      - name: Create build artifact manifest
        run: |
          echo "=== Creating build manifest ==="
          cat > /build-cache/installed-packages.json << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "job": "install-packages",
            "packages": ["cowsay", "hello", "jq", "tree"],
            "nix_store_count": $(ls /nix/store | wc -l),
            "build_cache_size": "$(du -sh /build-cache | cut -f1)"
          }
          EOF
          
          cat /build-cache/installed-packages.json
          
  use-packages:
    name: "Use Installed Packages (Read-Only)"
    runs-on: arc-runners
    needs: install-packages
    steps:
      - name: Checkout repository  
        uses: actions/checkout@v4
        
      - name: Install Nix
        run: |
          echo "=== Installing Nix ==="
          curl -L https://nixos.org/nix/install | sh -s -- --daemon
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "NIX_PATH=$NIX_PATH" >> $GITHUB_ENV
      
      - name: Check build cache manifest
        run: |
          echo "=== Checking build cache ==="
          if [ -f /build-cache/installed-packages.json ]; then
            echo "Build manifest found:"
            cat /build-cache/installed-packages.json
          else
            echo "❌ Build manifest not found - cache persistence issue!"
            exit 1
          fi
          
      - name: Verify Nix store persistence
        run: |
          echo "=== Verifying Nix store persistence ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          echo "Current packages in store: $(ls /nix/store | wc -l)"
          
          # Check if our test packages are still there
          echo "=== Looking for installed packages ==="
          if find /nix/store -name "*cowsay*" | grep -q cowsay; then
            echo "✅ cowsay found in Nix store"
          else
            echo "❌ cowsay not found in Nix store!"
            exit 1
          fi
          
          if find /nix/store -name "*hello*" | grep -q hello; then
            echo "✅ hello found in Nix store"
          else
            echo "❌ hello not found in Nix store!"
            exit 1
          fi
          
      - name: Use packages WITHOUT installing
        run: |
          echo "=== Using packages from persistent store ==="
          
          # These should work without nix-env install since they're in the store
          export PATH="/nix/store/$(ls /nix/store | grep cowsay | head -1)/bin:$PATH"
          export PATH="/nix/store/$(ls /nix/store | grep hello | head -1)/bin:$PATH"
          export PATH="/nix/store/$(ls /nix/store | grep jq | head -1)/bin:$PATH"
          export PATH="/nix/store/$(ls /nix/store | grep tree | head -1)/bin:$PATH"
          
          echo "🐄 Testing cowsay from persistent store:"
          cowsay "Packages persisted successfully across jobs!"
          
          echo "👋 Testing hello from persistent store:"
          hello
          
          echo "📊 Testing jq from persistent store:"
          echo '{"test": "nix-persistence", "result": "SUCCESS", "job": "use-packages"}' | jq .
          
      - name: Alternative - Use nix-shell for testing
        run: |
          echo "=== Testing with nix-shell (should be fast due to cache) ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          
          # This should be very fast since packages are already in store
          nix-shell -p cowsay --run "cowsay 'nix-shell works with persistent store!'"
          nix-shell -p hello --run "hello"
          nix-shell -p jq --run "echo '{\"cached\": true}' | jq ."
          
      - name: Performance comparison
        run: |
          echo "=== Performance metrics ==="
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          
          # Time a nix-shell command (should be fast due to cache)
          echo "Timing nix-shell with cached packages:"
          time nix-shell -p cowsay hello jq --run "echo 'All packages loaded from cache'"
          
          echo "=== Final cache status ==="
          echo "Nix store size: $(du -sh /nix/store)"
          echo "Build cache size: $(du -sh /build-cache)"
          
      - name: Update build manifest
        run: |
          echo "=== Updating build manifest ==="
          cat > /build-cache/test-results.json << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "job": "use-packages", 
            "test_result": "SUCCESS",
            "packages_verified": ["cowsay", "hello", "jq"],
            "nix_store_count": $(ls /nix/store | wc -l),
            "persistence_test": "PASSED"
          }
          EOF
          
          cat /build-cache/test-results.json
          
  cleanup-test:
    name: "Cleanup and Verify Persistence"
    runs-on: arc-runners  
    needs: [install-packages, use-packages]
    if: always()
    steps:
      - name: Show final state
        run: |
          echo "=== Final Environment State ==="
          echo "Nix store packages: $(ls /nix/store | wc -l)"
          echo "Nix store size: $(du -sh /nix/store)"
          echo "Build cache size: $(du -sh /build-cache)"
          
          echo "=== Build artifacts ==="
          ls -la /build-cache/
          
          if [ -f /build-cache/installed-packages.json ]; then
            echo "Install manifest:"
            cat /build-cache/installed-packages.json
          fi
          
          if [ -f /build-cache/test-results.json ]; then
            echo "Test results:"
            cat /build-cache/test-results.json
          fi
          
      - name: Persistence summary
        run: |
          echo "🎉 ==================================="
          echo "🎉 NIX PERSISTENCE TEST COMPLETE!"
          echo "🎉 ==================================="
          echo ""
          echo "✅ Packages installed in job 1"
          echo "✅ Packages available in job 2 without reinstalling"
          echo "✅ Build cache persistent across jobs"
          echo "✅ Nix store shared between runner instances"
          echo ""
          echo "This proves the local ARC + Nix environment"
          echo "successfully simulates AWS EKS + EFS persistence!" 


          